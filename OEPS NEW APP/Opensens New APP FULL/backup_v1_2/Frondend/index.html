<html lang="en">
  <head>

    <style>
      /* Fallback styles in case Tailwind isn't loading */
      body {
        background-color: #121212;
        color: white;
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
      }
      .fallback-message {
        padding: 20px;
        margin: 20px;
        background-color: #ff3e00;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- This content will be replaced by React if it loads properly -->
      <div class="fallback-message">
        <h1>Loading...</h1>
        <p>If you continue to see this message, there may be an issue with the application.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
